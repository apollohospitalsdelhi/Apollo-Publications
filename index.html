<div class="container">
    <div class="header-brand">
        <img src="logo.png" alt="Apollo Hospitals" class="header-logo">
    </div>

    <div class="header-tagline">
        <p class="tagline-main">Advancing Healthcare Through Research.</p>
        <p class="tagline-sub">Apollo Hospitals has over 1000 Publications in a Single Year</p>
    </div>

    <div class="search-container">
        <svg class="search-icon" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <circle cx="11" cy="11" r="8"/>
            <line x1="21" y1="21" x2="16.65" y2="16.65"/>
        </svg>
        <input type="search" id="search-input" placeholder="Search by title, author, journal, or keyword..." autocomplete="off">
    </div>

    <!-- ✅ CLOSE BUTTON ADDED -->
    <button id="closeBtn" style="margin-left:10px; font-size:18px; cursor:pointer;">✖</button>

    <div id="result-count" class="result-count"></div>
</div>
